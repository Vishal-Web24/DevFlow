services:
  postgres:
    image: postgres:15
    platform: linux/amd64
    container_name: devflow-postgres-dev
    environment:
      POSTGRES_DB: devflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    platform: linux/amd64
    container_name: devflow-redis-dev
    ports:
      - '6379:6379'
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data: